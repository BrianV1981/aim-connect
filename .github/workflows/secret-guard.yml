name: Secret Guard

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Check for committed secrets
        run: |
          echo "Scanning for forbidden files..."
          FORBIDDEN_FILES=(".env" "totp.secret" "password.hash")
          FAILED=0
          
          for file in "${FORBIDDEN_FILES[@]}"; do
            if git ls-files | grep -qi "$file"; then
              echo "::error::Forbidden file committed: $file"
              FAILED=1
            fi
          done
          
          if [ $FAILED -eq 1 ]; then
            exit 1
          fi
          echo "No forbidden files detected."
